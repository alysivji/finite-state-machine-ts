name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"
          - "24"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload bundle analysis to Codecov
        if: ${{ always() && !cancelled() && matrix.node == '24' }}
        env:
          BUNDLE_ANALYZER_UPLOAD_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: npm run codecov:bundle-analysis

      - name: Test
        run: ${{ matrix.node == '24' && 'npm run test:coverage:ci' || 'npm run test:coverage' }}

      - name: Upload coverage reports to Codecov
        if: ${{ always() && !cancelled() && matrix.node == '24' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ always() && !cancelled() && matrix.node == '24' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: test-report.junit.xml
